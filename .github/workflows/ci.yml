name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      AUTH_ENABLED: "false"
      LAUNCH_CITY_SLUG: lisbon
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      MAP_STYLE_URL: http://127.0.0.1:3000/test-map-style.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browser
        run: pnpm exec playwright install --with-deps chrome

      - name: Check env
        run: pnpm env:check

      - name: Validate seed
        run: pnpm seed:validate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit and integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Browser smoke
        run: CI=1 pnpm test:e2e
